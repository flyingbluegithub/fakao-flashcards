<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b0b11">
<title>法考手卡</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0b0b11;--s1:#111119;--s2:#1a1a28;--s3:#24243a;--bd:#2a2a3e;
  --ac:#c8a45e;--ac-b:rgba(200,164,94,.1);
  --gn:#3ecf8e;--gn-b:rgba(62,207,142,.1);
  --rd:#ef4444;--rd-b:rgba(239,68,68,.1);
  --t1:#e8e4dc;--t2:#9a958e;--t3:#5a5550;
  --fd:'Cormorant Garamond','Songti SC','STSong',serif;
  --fb:'DM Sans',-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:var(--fb);font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow:hidden}
#app{height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative}

/* ── Header ── */
#hd{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;padding-top:max(12px,env(safe-area-inset-top));flex-shrink:0;z-index:10}
#hd-back{display:none;align-items:center;justify-content:center;width:40px;height:40px;border:none;background:transparent;color:var(--t1);cursor:pointer;border-radius:10px}
#hd-back:active{background:var(--s2)}
#hd-title{font-family:var(--fd);font-size:20px;font-weight:600;letter-spacing:.02em}
#hd-right{width:40px}

/* ── Main ── */
#main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.scr{display:none;padding:0 16px 100px;min-height:100%}
.scr.on{display:block;animation:fi .22s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ── Tabs ── */
#tabs{display:flex;flex-shrink:0;background:rgba(11,11,17,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--bd);padding-bottom:max(8px,env(safe-area-inset-bottom))}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 0 4px;background:none;border:none;color:var(--t3);font-size:10px;font-family:var(--fb);cursor:pointer;transition:color .2s}
.tab svg{width:22px;height:22px;stroke-width:1.8}
.tab.on{color:var(--ac)}

/* ── Home ── */
.hero{background:var(--s1);border:1px solid var(--bd);border-radius:16px;padding:20px;margin-bottom:20px}
.hero-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
.hero-label{font-size:13px;color:var(--t2)}
.hero-num{font-family:var(--fd);font-size:28px;font-weight:700;color:var(--ac)}
.hero-bar{height:6px;background:var(--s3);border-radius:3px;overflow:hidden}
.hero-fill{height:100%;background:var(--ac);border-radius:3px;transition:width .5s ease}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.subj{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:16px;cursor:pointer;transition:transform .15s,border-color .2s;-webkit-tap-highlight-color:transparent;position:relative;overflow:hidden;opacity:0;animation:fadeUp .35s ease forwards}
.subj:nth-child(1){animation-delay:.03s}.subj:nth-child(2){animation-delay:.06s}
.subj:nth-child(3){animation-delay:.09s}.subj:nth-child(4){animation-delay:.12s}
.subj:nth-child(5){animation-delay:.15s}.subj:nth-child(6){animation-delay:.18s}
.subj:nth-child(7){animation-delay:.21s}.subj:nth-child(8){animation-delay:.24s}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.subj:active{transform:scale(.97)}
.subj::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--c)}
.subj-icon{font-size:22px;margin-bottom:8px}
.subj-name{font-size:15px;font-weight:600;margin-bottom:10px}
.subj-bar{height:4px;background:var(--s3);border-radius:2px;overflow:hidden;margin-bottom:6px}
.subj-fill{height:100%;border-radius:2px;background:var(--c);transition:width .5s ease}
.subj-pct{font-size:12px;color:var(--t2)}

/* ── Topic ── */
.topic-hd{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.topic-icon{font-size:28px}
.topic-name{font-family:var(--fd);font-size:24px;font-weight:700}
.topic-all{display:flex;align-items:center;justify-content:space-between;background:var(--ac-b);border:1px solid rgba(200,164,94,.25);border-radius:14px;padding:16px;margin-bottom:16px;cursor:pointer;transition:transform .15s}
.topic-all:active{transform:scale(.97)}
.topic-all-label{font-weight:600;color:var(--ac)}
.topic-all-sub{font-size:13px;color:var(--t2)}
.kp-card{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:14px 16px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:transform .15s}
.kp-card:active{transform:scale(.98)}
.kp-name{font-weight:600;font-size:15px}
.kp-info{font-size:12px;color:var(--t2);margin-top:3px}
.kp-dots{display:flex;gap:4px}
.kp-dot{width:8px;height:8px;border-radius:50%;background:var(--s3)}
.kp-dot.done{background:var(--gn)}.kp-dot.wrong{background:var(--rd)}

/* ── Study ── */
.study-top{margin-bottom:16px}
.study-bar-wrap{display:flex;align-items:center;gap:10px}
.study-bar{flex:1;height:4px;background:var(--s3);border-radius:2px;overflow:hidden}
.study-bar-fill{height:100%;background:var(--ac);border-radius:2px;transition:width .3s ease}
.study-counter{font-size:13px;color:var(--t2);white-space:nowrap}
.q-tags{display:flex;gap:8px;align-items:center;margin-bottom:14px}
.q-kp-tag{display:inline-block;font-size:11px;color:var(--ac);background:var(--ac-b);padding:3px 10px;border-radius:20px;font-weight:500}
.q-type-tag{display:inline-block;font-size:11px;color:var(--t2);background:var(--s3);padding:3px 10px;border-radius:20px;font-weight:500}
.q-year-tag{display:inline-block;font-size:11px;color:var(--t3);background:var(--s2);padding:3px 10px;border-radius:20px;font-weight:500}
.q-text{font-size:16px;line-height:1.75;margin-bottom:18px;font-weight:500}
.q-opts{display:flex;flex-direction:column;gap:10px}
.q-opt{display:flex;align-items:flex-start;gap:12px;width:100%;padding:14px 16px;background:var(--s2);border:1.5px solid var(--bd);border-radius:12px;color:var(--t1);font-size:15px;line-height:1.55;text-align:left;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;font-family:var(--fb)}
.q-opt:active:not(.locked){transform:scale(.98);background:var(--s3)}
.q-opt.selected{border-color:var(--ac);background:var(--ac-b)}
.q-opt.selected .opt-ltr{background:var(--ac);color:var(--bg)}
.opt-ltr{flex-shrink:0;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--s3);font-size:13px;font-weight:700;color:var(--t2);transition:all .25s}
.q-opt.correct{border-color:var(--gn);background:var(--gn-b)}
.q-opt.correct .opt-ltr{background:var(--gn);color:#fff}
.q-opt.wrong{border-color:var(--rd);background:var(--rd-b)}
.q-opt.wrong .opt-ltr{background:var(--rd);color:#fff}
.q-opt.dimmed{opacity:.3}
.q-opt.locked{pointer-events:none}
.q-exp{max-height:0;overflow:hidden;opacity:0;transition:max-height .4s ease,opacity .3s ease .1s;margin-top:0}
.q-exp.vis{max-height:600px;opacity:1;margin-top:18px}
.exp-inner{padding:16px;background:var(--s1);border-radius:12px;border-left:3px solid var(--ac)}
.exp-label{font-size:11px;font-weight:700;color:var(--ac);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.exp-text{font-size:14px;line-height:1.75;color:var(--t2)}
.study-acts{display:flex;gap:10px;margin-top:18px;opacity:0;transform:translateY(12px);pointer-events:none;transition:all .3s ease}
.study-acts.vis{opacity:1;transform:none;pointer-events:all}
.act-btn{flex:1;padding:14px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;border:none;font-family:var(--fb);transition:all .15s}
.act-no{background:var(--s3);color:var(--t1)}
.act-no:active{background:var(--rd-b);color:var(--rd)}
.act-yes{background:var(--ac);color:var(--bg)}
.act-yes:active{opacity:.8}

/* ── Summary ── */
.summary{display:flex;flex-direction:column;align-items:center;padding-top:40px;text-align:center}
.sum-icon{width:72px;height:72px;border-radius:50%;background:var(--gn-b);display:flex;align-items:center;justify-content:center;font-size:36px;color:var(--gn);margin-bottom:20px}
.summary h2{font-family:var(--fd);font-size:26px;margin-bottom:24px}
.sum-stats{display:flex;gap:24px;margin-bottom:36px}
.sum-stat{text-align:center}
.sum-num{font-family:var(--fd);font-size:32px;font-weight:700}
.sum-label{font-size:12px;color:var(--t2);margin-top:2px}
.sum-acts{display:flex;flex-direction:column;gap:10px;width:100%}
.sum-acts .act-btn{flex:none;width:100%}

/* ── Review ── */
.review-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.review-total{font-size:15px;color:var(--t2)}
.rg-card{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:14px 16px;margin-bottom:10px}
.rg-head{display:flex;align-items:center;gap:10px}
.rg-icon{font-size:18px}
.rg-name{font-weight:600;flex:1}
.rg-count{font-size:13px;color:var(--t2);margin-right:8px}
.rg-btn{background:var(--ac);color:var(--bg);border:none;border-radius:8px;padding:6px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--fb)}
.rg-btn:active{opacity:.8}

/* ── Stats ── */
.stats-ring-wrap{display:flex;justify-content:center;margin:20px 0 28px}
.ring{width:150px;height:150px;border-radius:50%;background:conic-gradient(var(--ac) calc(var(--pct)*1%),var(--s2) 0);display:flex;align-items:center;justify-content:center}
.ring-inner{width:120px;height:120px;border-radius:50%;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-pct{font-family:var(--fd);font-size:32px;font-weight:700}
.ring-label{font-size:11px;color:var(--t2)}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:28px}
.sn{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:14px;text-align:center}
.sn-num{font-family:var(--fd);font-size:28px;font-weight:700}
.sn-label{font-size:12px;color:var(--t2);margin-top:2px}
.ss-section h3{font-size:14px;font-weight:600;color:var(--t2);margin-bottom:12px}
.ss-item{margin-bottom:14px}
.ss-head{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px}
.ss-pct{color:var(--t2)}
.ss-bar{height:6px;background:var(--s3);border-radius:3px;overflow:hidden}
.ss-fill{height:100%;border-radius:3px;transition:width .5s ease}
.btn-reset{display:block;width:100%;margin-top:28px;padding:14px;background:transparent;border:1px solid var(--bd);border-radius:12px;color:var(--rd);font-size:14px;font-weight:500;cursor:pointer;font-family:var(--fb)}
.btn-reset:active{background:var(--rd-b)}

/* ── Empty ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding-top:80px;text-align:center}
.empty-icon{font-size:48px;margin-bottom:16px}
.empty p{font-size:16px;color:var(--t2)}
.empty-sub{font-size:13px;color:var(--t3);margin-top:4px}

/* ── Grain ── */
body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  z-index:9999}

/* ── Scrollbar ── */
#main::-webkit-scrollbar{width:3px}
#main::-webkit-scrollbar-track{background:transparent}
#main::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
</style>
</head>

  <nav id="tabs">

  </nav>

</div>

/* ========== 工具函数 ========== */
const QTYPE_LABEL = { single:'单选', multiple:'多选', mixed:'不定项' };

/** 判断某题的 ans 是否为数组（多选题） */
function isMulti(q){ return Array.isArray(q.ans) }

/** 规范化 ans——总是返回数组 */
function getAnsArr(q){ return isMulti(q) ? q.ans : [q.ans] }

/** 判断用户的选中是否完全正确 */
function isAnswerCorrect(q, selectedIndices){
  const correct = getAnsArr(q);
  if(selectedIndices.length !== correct.length) return false;
  return correct.every(i => selectedIndices.includes(i));
}

/* ========== 全局状态 ========== */
let progress = {};
let curScr = 'home';
let curSid = null;
let sQueue = [], sIdx = 0, answered = false;
let sStats = {correct:0, wrong:0, wrongIds:[]};
let sSource = 'topic';
let gSelected = []; // 多选题临时选中

/* ========== 进度读写 ========== */
function loadProg(){ try{progress=JSON.parse(localStorage.getItem('lc_p')||'{}')}catch(e){progress={}} }
function saveProg(){ localStorage.setItem('lc_p',JSON.stringify(progress)) }
function subStat(sid){ const sq=questions.filter(q=>q.subject===sid); const k=sq.filter(q=>progress[q.id]?.known).length; return{total:sq.length,known:k,pct:sq.length?Math.round(k/sq.length*100):0} }
function allStat(){ const t=questions.length, k=questions.filter(q=>progress[q.id]?.known).length; return{total:t,known:k,pct:t?Math.round(k/t*100):0} }

/* ========== 路由 ========== */
function show(s){
  ['home','topic','study','review','stats'].forEach(n=>document.getElementById('scr-'+n).style.display=n===s?'block':'none');
  document.getElementById('tabs').style.display=['home','review','stats'].includes(s)?'flex':'none';
  document.getElementById('hd-back').style.display=['topic','study'].includes(s)?'flex':'none';
  curScr=s; document.getElementById('main').scrollTop=0;
}
function switchTab(t){
  document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('on',el.dataset.tab===t));
  show(t);
  if(t==='home')renderHome(); else if(t==='review')renderReview(); else if(t==='stats')renderStats();
}
function setH(t){document.getElementById('hd-title').textContent=t}
function goBack(){
  if(curScr==='study'){if(sSource==='topic')showTopics(curSid);else switchTab('review')}
  else if(curScr==='topic')switchTab('home');
}

/* ========== 首页 ========== */
function renderHome(){
  const o=allStat();
  let h=`<div class="hero"><div class="hero-top"><span class="hero-label">总体掌握</span><span class="hero-num">${o.known} / ${o.total}</span></div><div class="hero-bar"><div class="hero-fill" style="width:${o.pct}%"></div></div></div><div class="grid">`;
  SUBJECTS.forEach(s=>{
    const t=subStat(s.id);
    h+=`<div class="subj" style="--c:${s.color}" onclick="showTopics('${s.id}')"><div class="subj-icon">${s.icon}</div><div class="subj-name">${s.name}</div><div class="subj-bar"><div class="subj-fill" style="width:${t.pct}%"></div></div><div class="subj-pct">${t.known} / ${t.total}</div></div>`;
  });
  document.getElementById('scr-home').innerHTML=h+'</div>'; setH('法考手卡');
}

/* ========== 知识点列表 ========== */
function showTopics(sid){
  curSid=sid;
  const sub=SUBJECTS.find(s=>s.id===sid);
  const kps=[...new Set(questions.filter(q=>q.subject===sid).map(q=>q.kp))];
  const st=subStat(sid);
  let h=`<div class="topic-hd"><span class="topic-icon">${sub.icon}</span><span class="topic-name">${sub.name}</span></div><div class="topic-all" onclick="startAll('${sid}')"><div><div class="topic-all-label">全部题目</div><div class="topic-all-sub">${st.total} 题 · 已掌握 ${st.known} 题</div></div><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--ac)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></div>`;
  kps.forEach((kp,i)=>{
    const kq=questions.filter(q=>q.subject===sid&&q.kp===kp);
    const dots=kq.map(q=>`<span class="${!progress[q.id]?'kp-dot':(progress[q.id].known?'kp-dot done':'kp-dot wrong')}"></span>`).join('');
    h+=`<div class="kp-card" data-sid="${sid}" data-ki="${i}"><div><div class="kp-name">${kp}</div><div class="kp-info">${kq.length} 题</div></div><div class="kp-dots">${dots}</div></div>`;
  });
  document.getElementById('scr-topic').innerHTML=h;
  document.querySelectorAll('.kp-card[data-ki]').forEach(el=>{
    el.onclick=()=>{const kp=kps[+el.dataset.ki]; startKP(sid,kp)};
  });
  show('topic'); setH(sub.name);
}
function startAll(sid){startStudy(questions.filter(q=>q.subject===sid),'topic')}
function startKP(sid,kp){startStudy(questions.filter(q=>q.subject===sid&&q.kp===kp),'topic')}

/* ========== 做题（支持单选/多选/不定项） ========== */
function startStudy(q,src){
  sQueue=q; sIdx=0; answered=false; sStats={correct:0,wrong:0,wrongIds:[]}; sSource=src;
  gSelected=[];
  renderQ(); show('study');
}

function renderQ(){
  answered=false; gSelected=[];
  const q=sQueue[sIdx], pct=Math.round(sIdx/sQueue.length*100);
  const qtypeLabel = QTYPE_LABEL[q.qtype] || '单选';
  const yearInfo = q.year ? String(q.year) : '';
  
  document.getElementById('scr-study').innerHTML=`
    <div class="study-top"><div class="study-bar-wrap"><div class="study-bar"><div class="study-bar-fill" style="width:${pct}%"></div></div><div class="study-counter">${sIdx+1} / ${sQueue.length}</div></div></div>
    <div class="q-tags">
      <span class="q-kp-tag">${q.kp}</span>
      <span class="q-type-tag">${qtypeLabel}</span>
      ${q.year ? `<span class="q-year-tag">${yearInfo}</span>` : ''}
    </div>
    <div class="q-text">${q.q}</div>
    <div class="q-opts" id="q-opts">${q.opts.map((o,i)=>`<button class="q-opt${isMulti(q)?' multi':''}" data-i="${i}"><span class="opt-ltr">${'ABCDEFGH'[i]}</span><span>${o}</span></button>`).join('')}</div>
    <div class="q-exp" id="q-exp"><div class="exp-inner"><div class="exp-label">解析</div><p class="exp-text">${q.exp}</p></div></div>
    <div class="study-acts" id="sActs">
      ${isMulti(q) ? '<button class="act-btn act-yes" id="btnSubmit" style="flex:2">提交答案</button>' : ''}
      <button class="act-btn act-no" id="btnNo">还不会</button><button class="act-btn act-yes" id="btnYes">记住了</button>
    </div>`;
  
  // 单选：点击即判断
  if(!isMulti(q)){
    document.querySelectorAll('.q-opt').forEach(b=>b.onclick=()=>selOpt(+b.dataset.i));
  } else {
    // 多选：点击选中/取消，提交时判断
    document.querySelectorAll('.q-opt').forEach(b=>{
      b.onclick=()=>{ if(!answered){ b.classList.toggle('selected'); const i=+b.dataset.i; gSelected.includes(i)?gSelected.splice(gSelected.indexOf(i),1):gSelected.push(i); }};
    });
    document.getElementById('btnSubmit').onclick=()=>submitMulti();
  }
  document.getElementById('btnNo').onclick=()=>markR(false);
  document.getElementById('btnYes').onclick=()=>markR(true);
  setH(`第 ${sIdx+1} 题`);
}

/* 单选选择 */
function selOpt(i){
  if(answered) return; answered=true;
  const q=sQueue[sIdx], ok=i===q.ans;
  if(ok) sStats.correct++; else{sStats.wrong++; sStats.wrongIds.push(q.id)}
  document.querySelectorAll('.q-opt').forEach((el,j)=>{
    el.classList.add('locked');
    if(isMulti(q)){
      const correct = getAnsArr(q);
      if(correct.includes(j)) el.classList.add('correct');
      else if(gSelected.includes(j) && !correct.includes(j)) el.classList.add('wrong');
      else el.classList.add('dimmed');
    } else {
      if(j===q.ans) el.classList.add('correct');
      else if(j===i&&!ok) el.classList.add('wrong');
      else el.classList.add('dimmed');
    }
  });
  setTimeout(()=>document.getElementById('q-exp').classList.add('vis'),100);
  setTimeout(()=>document.getElementById('sActs').classList.add('vis'),250);
}

/* 多选提交 */
function submitMulti(){
  if(answered) return; answered=true;
  const q=sQueue[sIdx];
  const ok = isAnswerCorrect(q, gSelected);
  if(ok) sStats.correct++; else{sStats.wrong++; sStats.wrongIds.push(q.id)}
  
  const correct = getAnsArr(q);
  document.querySelectorAll('.q-opt').forEach((el,j)=>{
    el.classList.add('locked');
    if(correct.includes(j)) el.classList.add('correct');
    else if(gSelected.includes(j) && !correct.includes(j)) el.classList.add('wrong');
    else el.classList.add('dimmed');
  });
  // 移除选中态
  document.querySelectorAll('.q-opt.selected').forEach(el=>el.classList.remove('selected'));
  
  setTimeout(()=>document.getElementById('q-exp').classList.add('vis'),100);
  setTimeout(()=>document.getElementById('sActs').classList.add('vis'),250);
}

function markR(known){
  progress[sQueue[sIdx].id]={known,ts:Date.now()}; saveProg();
  sIdx++; if(sIdx<sQueue.length) { renderQ(); } else showSum();
}

function showSum(){
  const t=sQueue.length, c=sStats.correct, pct=t?Math.round(c/t*100):0;
  document.getElementById('scr-study').innerHTML=`
    <div class="summary">
      <div class="sum-icon">✓</div><h2>本轮完成</h2>
      <div class="sum-stats">
        <div class="sum-stat"><div class="sum-num" style="color:var(--gn)">${c}</div><div class="sum-label">已掌握</div></div>
        <div class="sum-stat"><div class="sum-num" style="color:var(--rd)">${t-c}</div><div class="sum-label">需复习</div></div>
        <div class="sum-stat"><div class="sum-num">${pct}%</div><div class="sum-label">正确率</div></div>
      </div>
      <div class="sum-acts">
        ${sStats.wrongIds.length?`<button class="act-btn act-no" id="btnRew">只复习错题 (${sStats.wrongIds.length})</button>`:''}
        <button class="act-btn act-yes" id="btnAll">全部重做</button>
        <button class="act-btn" style="background:var(--s3);color:var(--t2)" id="btnBack">返回</button>
      </div>
    </div>`;
  document.getElementById('btnAll').onclick=()=>startStudy(sQueue,sSource);
  document.getElementById('btnBack').onclick=goBack;
  const r=document.getElementById('btnRew'); if(r) r.onclick=()=>{startStudy(sQueue.filter(q=>sStats.wrongIds.includes(q.id)),sSource)};
  setH('完成');
}

/* ========== 错题本 ========== */

  const el=document.getElementById('scr-review');
  const wrongs=questions.filter(q=>progress[q.id]&&!progress[q.id].known);

  const g={}; wrongs.forEach(q=>(g[q.subject]=g[q.subject]||[]).push(q));
  let h=`<div class="review-top"><div class="review-total">${wrongs.length} 道待复习</div><button class="act-btn act-yes" style="flex:none;padding:8px 18px;font-size:13px;border-radius:10px" id="rawAll">全部复习</button></div>`;
  for(const[sid,qs] of Object.entries(g)){
    const sub=SUBJECTS.find(s=>s.id===sid);
    h+=`<div class="rg-card"><div class="rg-head"><span class="rg-icon" style="color:${sub.color}">${sub.icon}</span><span class="rg-name">${sub.name}</span><span class="rg-count">${qs.length}题</span><button class="rg-btn" data-sid="${sid}">复习</button></div></div>`;
  }
  el.innerHTML=h;
  document.getElementById('rawAll').onclick=()=>startStudy(wrongs,'review');
  el.querySelectorAll('.rg-btn').forEach(b=>b.onclick=()=>{const s=b.dataset.sid; startStudy(wrongs.filter(q=>q.subject===s),'review')});
  setH('错题本');
}

/* ========== 统计 ========== */
function renderStats(){
  const el=document.getElementById('scr-stats');
  const t=questions.length, done=questions.filter(q=>progress[q.id]).length;
  const known=questions.filter(q=>progress[q.id]?.known).length, unk=done-known;
  const acc=done?Math.round(known/done*100):0, pct=t?Math.round(done/t*100):0;
  let h=`<div class="stats-ring-wrap"><div class="ring" style="--pct:${pct}"><div class="ring-inner"><div class="ring-pct">${pct}%</div><div class="ring-label">完成度</div></div></div></div><div class="stats-grid"><div class="sn"><div class="sn-num">${done}</div><div class="sn-label">已做</div></div><div class="sn"><div class="sn-num" style="color:var(--gn)">${known}</div><div class="sn-label">已掌握</div></div><div class="sn"><div class="sn-num" style="color:var(--rd)">${unk}</div><div class="sn-label">待复习</div></div><div class="sn"><div class="sn-num">${acc}%</div><div class="sn-label">正确率</div></div></div><div class="ss-section"><h3>各科进度</h3>`;
  SUBJECTS.forEach(s=>{
    const sq=questions.filter(q=>q.subject===s.id), sk=sq.filter(q=>progress[q.id]?.known).length;
    const sp=sq.length?Math.round(sk/sq.length*100):0;
    h+=`<div class="ss-item"><div class="ss-head"><span>${s.icon} ${s.name}</span><span class="ss-pct">${sk} / ${sq.length}</span></div><div class="ss-bar"><div class="ss-fill" style="width:${sp}%;background:${s.color}"></div></div></div>`;
  });
  h+=`</div><button class="btn-reset" id="btnReset">清除所有进度</button>`;
  el.innerHTML=h;
  document.getElementById('btnReset').onclick=()=>{if(confirm('确定清除所有学习进度？')){progress={};saveProg();renderStats()}};
  setH('学习统计');
}

/* ========== 启动 ========== */
console.log('法考手卡: 题库加载题数 =', questions.length);
(function(){
  try{
    var d=document.createElement('div');
    d.style.cssText='position:fixed;top:0;left:0;right:0;z-index:9999;background:#c8a45e;color:#0b0b11;text-align:center;font-size:12px;padding:2px;font-family:sans-serif';
    d.textContent='题库: '+questions.length+' 题';
    document.body.appendChild(d);
    setTimeout(function(){d.remove()}, 5000);
  }catch(e){}
})();
loadProg(); renderHome();
